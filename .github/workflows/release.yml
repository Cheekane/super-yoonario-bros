name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pygame-ce
      - run: python tests/smoke_test.py

  macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pygame-ce pyinstaller
      - run: >
          pyinstaller --windowed --name "Super Yoonario Bros"
          --icon assets/yoonario.icns main.py
      - name: Declare Local Network usage (macOS privacy prompt)
        run: |
          plutil -replace NSLocalNetworkUsageDescription \
            -string "Finds your router to set up online multiplayer hosting and lets friends on your wifi join your game." \
            "dist/Super Yoonario Bros.app/Contents/Info.plist"
          codesign --force --deep -s - "dist/Super Yoonario Bros.app"
      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --keepParent "Super Yoonario Bros.app" SuperYoonarioBros-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/SuperYoonarioBros-macOS.zip
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/SuperYoonarioBros-macOS.zip
          body_path: .github/release-notes.md

  windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pygame-ce pyinstaller
      - run: >
          pyinstaller --onefile --windowed --name SuperYoonarioBros
          --icon assets/yoonario.ico main.py
      - name: Rename exe
        run: Rename-Item dist/SuperYoonarioBros.exe SuperYoonarioBros-Windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/SuperYoonarioBros-Windows.exe
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/SuperYoonarioBros-Windows.exe
          body_path: .github/release-notes.md
